name: Python Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask flask-cors requests

    - name: Syntax check all Python files
      run: |
        python -m py_compile honeypot.py  && echo "honeypot.py  OK"
        python -m py_compile dashboard.py && echo "dashboard.py OK"
        python -m py_compile db.py        && echo "db.py        OK"
        python -m py_compile config.py    && echo "config.py    OK"
        python -m py_compile alerts.py    && echo "alerts.py    OK"
        python -m py_compile geo.py       && echo "geo.py       OK"
